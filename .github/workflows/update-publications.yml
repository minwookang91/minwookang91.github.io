name: Check publication metadata

on:
  workflow_dispatch:
  schedule:
    - cron: "23 15 * * 1"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh from Crossref
        env:
          CROSSREF_MAILTO: minwookang91@gmail.com
        run: python scripts/update_publications.py
      - name: Commit changes when needed
        run: |
          if git diff --quiet; then
            echo "No publication changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/publications.json
          git commit -m "Update publication metadata"
          git push
